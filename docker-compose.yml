services:
  # 1. База Данных (Postgres)
  db:
    image: postgres:15-alpine
    container_name: glavkrepezh_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Эти переменные Postgres подхватит при первом запуске для создания БД
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - glav_net

  # 2. Наш Бэкенд (FastAPI + uv)
  web:
    build: .
    container_name: glavkrepezh_web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Важно: пробрасываем папки, чтобы файлы (картинки категорий и Excel) 
      # сохранялись на физическом диске сервера
      - ./static:/app/static
      - ./uploads:/app/uploads
    # Мы НЕ открываем порты 8000 наружу, чтобы никто не зашел в обход Nginx
    networks:
      - glav_net

  # 3. Веб-сервер (Nginx)
  nginx:
    image: nginx:alpine
    container_name: glavkrepezh_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443" 
    depends_on:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Nginx забирает статику напрямую с диска (для скорости)
      - ./static:/usr/share/nginx/html/static:ro
      - ./uploads:/usr/share/nginx/html/uploads:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - glav_net

volumes:
  postgres_data:

networks:
  glav_net:
    driver: bridge