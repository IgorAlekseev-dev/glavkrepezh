<!-- ИСПРАВЛЕННЫЙ БАННЕР -->
<div x-data="{ 
            show: false,
            accept() {
                localStorage.setItem('cookieAccepted', 'true');
                this.show = false;
                window.dispatchEvent(new Event('cookie-accepted'));
            },
            decline() {
                localStorage.setItem('cookieAccepted', 'declined');
                this.show = false;
            }
         }" 
         x-init="$nextTick(() => { 
             const status = localStorage.getItem('cookieAccepted');
             if (!status) { 
                 setTimeout(() => show = true, 2000); 
             } else if (status === 'true') {
                 window.dispatchEvent(new Event('cookie-accepted'));
             }
         })" 
         x-show="show" 
         x-cloak 
         x-transition:enter="transition ease-out duration-500"
         x-transition:enter-start="opacity-0 translate-y-10 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100" 
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-10 scale-95"
         
         style="display: none; z-index: 999999;"
         
         class="fixed bottom-4 left-4 right-4 md:bottom-8 md:right-8 md:left-auto md:w-80 bg-white border border-slate-200 rounded-2xl shadow-2xl p-6">

    <!-- Заголовок -->
    <div class="flex items-center gap-3 mb-3">
        <div class="w-8 h-8 bg-brand-accent/10 rounded-lg flex items-center justify-center text-brand-accent">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5" />
                <path d="M8.5 8.5v.01" />
                <path d="M16 15.5v.01" />
                <path d="M12 12v.01" />
                <path d="M11 17v.01" />
                <path d="M7 14v.01" />
            </svg>
        </div>
        <h4 class="text-slate-900 font-black uppercase tracking-tighter text-sm">
            Мы используем Cookie
        </h4>
    </div>

    <!-- Текст (Темный) -->
    <p class="text-slate-600 text-xs leading-relaxed mb-6">
        Файлы cookie помогают нам анализировать трафик и улучшать сайт. Ознакомьтесь с нашей
        <a href="/privacy"
            class="text-brand-accentDark font-bold underline hover:text-brand-accent transition-colors">политикой
            конфиденциальности</a>.
    </p>

    <!-- Кнопки -->
    <div class="flex flex-col gap-2">
        <button @click="accept()"
            class="w-full py-3 bg-brand-accent text-slate-900 font-black uppercase text-[11px] tracking-widest rounded-xl hover:bg-brand-accentHover transition-all shadow-md shadow-brand-accent/10 active:scale-95">
            Принять
        </button>

        <button @click="decline()"
            class="w-full py-2.5 bg-slate-50 text-slate-600 font-bold uppercase text-[10px] tracking-widest rounded-xl hover:bg-slate-100 hover:text-slate-900 transition-all active:scale-95">
            Отключить
        </button>
    </div>
</div>
