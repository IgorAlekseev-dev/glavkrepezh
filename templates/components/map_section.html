<section class="w-full bg-white border-t border-gray-200" x-data="{ loaded: false }">
    <div class="grid grid-cols-1 lg:grid-cols-3 min-h-[500px]">

        <!-- 1. ЛЕВАЯ КОЛОНКА: КАРТА -->
        <div class="relative w-full h-[400px] lg:h-auto lg:col-span-2 bg-slate-200 order-2 lg:order-1 overflow-hidden">

            <!-- ПЛЕЙСХОЛДЕР (До нажатия) -->
            <!-- Выглядит точно так же, как активная карта в режиме ожидания -->
            <div x-show="!loaded" class="absolute inset-0 z-20 flex items-center justify-center cursor-pointer group"
                @click="loaded = true">

                <!-- Статичное фото карты (должно быть скриншотом реальной карты) -->
                <!-- Убрали opacity и grayscale, чтобы было 1 в 1 как реальная карта -->
                <img src="/static/images/map.avif" class="absolute inset-0 w-full h-full object-cover"
                    alt="Карта проезда">

                <!-- Кнопка-обманка (Стилизована 1-в-1 как кнопка управления) -->
                <!-- Добавили transition для красоты при наведении -->
                <button
                    class="relative z-30 bg-white/90 backdrop-blur-sm px-6 py-3 rounded-full shadow-xl border border-white/20 transform transition-all duration-300 hover:scale-105 active:scale-95 group-hover:translate-y-0">
                    <span class="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center gap-2">
                        <!-- Та же иконка "Рука" -->
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand-accent" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                        </svg>
                        Нажмите для управления
                    </span>
                </button>
            </div>

            <!-- ИНТЕРАКТИВНАЯ КАРТА (Подгружается после клика) -->
            <template x-if="loaded">
                <div class="w-full h-full" x-data="{ isInteractive: false }" @mouseleave="isInteractive = false">

                    <!-- Iframe -->
                    <div class="w-full h-full transition-opacity duration-300"
                        :class="isInteractive ? 'pointer-events-auto' : 'pointer-events-none'">
                        <iframe
                            src="https://yandex.ru/map-widget/v1/?um=constructor%3Ab3cba70911aacb4a23ac902dd0e64a1fa00ce42a74e9156186d52dc736133758&source=constructor"
                            title="Интерактивная карта местонахождения магазина ГлавКрепеж" width="100%" height="100%"
                            frameborder="0" allowfullscreen="true" class="w-full h-full">
                        </iframe>
                    </div>

                    <!-- Оверлей управления (Появляется, когда мышь уходит с карты) -->
                    <div class="absolute inset-0 z-10 flex items-center justify-center bg-black/5 cursor-pointer group"
                        x-show="!isInteractive" x-transition.opacity @click="isInteractive = true">

                        <!-- Точно такая же кнопка -->
                        <div
                            class="bg-white/90 backdrop-blur-sm px-6 py-3 rounded-full shadow-xl border border-white/20 transform translate-y-4 group-hover:translate-y-0 opacity-0 group-hover:opacity-100 transition-all duration-300">
                            <span
                                class="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand-accent"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                                </svg>
                                Нажмите для управления
                            </span>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- 2. ПРАВАЯ КОЛОНКА (Инфо) - без изменений -->
        <div
            class="bg-slate-900 text-white p-8 lg:p-12 flex flex-col justify-center relative z-20 shadow-2xl order-1 lg:order-2 border-b-4 lg:border-b-0 lg:border-l-4 border-brand-accent">
            <!-- Декор -->
            <div class="absolute top-0 right-0 p-6 opacity-10 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-32 h-32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                    <circle cx="12" cy="10" r="3" />
                </svg>
            </div>

            <h3 class="text-3xl font-bold uppercase mb-2 tracking-tight">Наш магазин</h3>
            <p class="text-gray-400 mb-8 text-sm">Магазин и склад в центре города</p>

            <ul class="space-y-8">
                <li class="flex gap-4">
                    <div
                        class="shrink-0 w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-brand-accent">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                            <circle cx="12" cy="10" r="3" />
                        </svg>
                    </div>
                    <div>
                        <p class="font-bold text-lg leading-tight mb-1">г. Иваново,<br> ул. Бубнова 41</p>
                    </div>
                </li>
                <li class="flex gap-4">
                    <div
                        class="shrink-0 w-12 h-12 bg-white/10 rounded-xl flex items-center justify-center text-brand-accent">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-white font-bold text-2xl tracking-tight">08:00 – 19:00</p>
                        <p class="text-gray-400 text-xs mt-1 uppercase font-bold tracking-wider">Без перерывов и
                            выходных</p>
                    </div>
                </li>
            </ul>

            <div class="mt-10 pt-8 border-t border-white/10">
                <a href="https://yandex.ru/maps/-/CPUzUNOX" target="_blank"
                    onclick="if(typeof ym !== 'undefined') ym(108419578, 'reachGoal', 'route_click');"
                    rel="noopener noreferrer"
                    class="group w-full flex items-center justify-center gap-3 bg-brand-accent hover:bg-brand-accentHover text-slate-900 py-4 rounded-xl font-bold uppercase tracking-wider transition-all shadow-lg hover:shadow-orange-500/20 active:translate-y-0.5">
                    <span>Построить маршрут</span>
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="w-5 h-5 transition-transform group-hover:translate-x-1" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14" />
                        <path d="m12 5 7 7-7 7" />
                    </svg>
                </a>
            </div>
        </div>
    </div>
</section>
