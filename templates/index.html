  <style>
    [x-cloak] {
      display: none !important;
    }

    /* Кастомный скроллбар для красоты */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Индикатор загрузки HTMX */
    .htmx-indicator {
      opacity: 0;
      transition: opacity 200ms ease-in;
    }

    .htmx-request .htmx-indicator {
      opacity: 1
    }

    .htmx-request.htmx-indicator {
      opacity: 1
    }

<!-- Alpine x-data для глобального состояния (например, корзина или мобильное меню) -->

<body class="flex flex-col min-h-screen bg-brand-light text-brand-dark" hx-boost="true"
  x-data="{ mobileMenuOpen: false }">

  <!-- Шапка -->
  {% include 'components/header.html' %}

  <!-- Контент -->
  <main class="flex-grow">
    {% block content %}{% endblock %}
  </main>

  <!-- Подвал -->
  {% include 'components/footer.html' %}

  <!-- Кнопка 'Наверх' (появляется при скролле) -->
  <button x-data="{ show: false }" @scroll.window="show = (window.pageYOffset > 300)" x-show="show" x-transition
    @click="window.scrollTo({top: 0, behavior: 'smooth'})"
    class="fixed bottom-8 right-8 bg-brand-accent hover:bg-brand-accentHover text-slate-900 p-3 rounded-full shadow-lg z-50">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
    </svg>
  </button>

  {% include 'components/cookie_banner.html' %}

  <script type="text/javascript">
    // 1. Создаем функцию запуска метрики (Твой код от Яндекса, но внутри функции)
    function initYandexMetrika() {
      // Защита: если метрика уже запущена, не запускаем второй раз
      if (window.ym) return;

      (function (m, e, t, r, i, k, a) {
        m[i] = m[i] || function () { (m[i].a = m[i].a || []).push(arguments) };
        m[i].l = 1 * new Date();
        for (var j = 0; j < document.scripts.length; j++) { if (document.scripts[j].src === r) { return; } }
        k = e.createElement(t), a = e.getElementsByTagName(t)[0], k.async = 1, k.src = r, a.parentNode.insertBefore(k, a)
      })(window, document, 'script', 'https://mc.yandex.ru/metrika/tag.js?id=108419578', 'ym');

      ym(108419578, 'init', {
        ssr: true,
        webvisor: true,
        clickmap: true,
        ecommerce: "dataLayer",
        referrer: document.referrer,
        url: location.href,
        accurateTrackBounce: true,
        trackLinks: true
      });
      console.log("✅ Яндекс Метрика активирована (Cookie приняты)");
    }

    // 2. Ждем сигнала от нашего Cookie-баннера
    // Эта строка запустит Метрику ТОЛЬКО когда вызовется 'cookie-accepted'
    window.addEventListener('cookie-accepted', initYandexMetrika);

    // 3. Учим Метрику понимать HTMX
    // Когда HTMX меняет страницу без перезагрузки, отправляем Яндексу новый "хит"
    document.body.addEventListener('htmx:pushedIntoHistory', function (evt) {
      if (typeof ym !== 'undefined') {
        ym(108419578, 'hit', evt.detail.path);
      }
    });
  </script>

</body>

</html>
